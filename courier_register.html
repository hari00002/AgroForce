{% extends "layout.html" %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 40px 0;">
    <div class="card" style="width: 100%; max-width: 550px; padding: 40px 30px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="font-weight: 700; color: var(--text-main); font-size: 1.5rem;">Courier Registration</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Join the logistics fleet and earn credits per delivery.</p>
        </div>

        <form method="POST">
            <div style="display: flex; gap: 16px;">
                <div class="form-group" style="flex: 1;">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="e.g. John Doe">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Contact Number</label>
                    <input type="tel" name="phone" required placeholder="e.g. 9876543210" pattern="[0-9]{10}">
                </div>
            </div>
            
            <div style="display: flex; gap: 16px;">
                <div class="form-group" style="flex: 1;">
                    <label>Delivery ID (For Login)</label>
                    <input type="text" name="delivery_id" required placeholder="e.g. DLV-1024">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Assigned Region (City)</label>
                    <input type="text" name="location" required placeholder="e.g. Salem">
                </div>
            </div>

            <div class="form-group">
                <label>Secure Passcode</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary full-width" style="padding: 12px; margin-top: 10px; font-size: 1rem;">Register Fleet Identity</button>
        </form>
    </div>
</div>
{% endblock %}
